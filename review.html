<!DOCTYPE html>
<html>
<head>
<title>Give Review</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="review-form">
  <h2>Submit Your Review</h2>

  <form id="reviewForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="country" placeholder="Country" required>
  <input type="file" id="photo" accept="image/*" required>
    <textarea id="message" placeholder="Your Review" required></textarea>
    
    <select id="rating">
      <option value="5">⭐⭐⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="2">⭐⭐</option>
      <option value="1">⭐</option>
    </select>

    <button type="submit">Submit</button>
  </form>
</div>
<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPTfQVXbbb-WOdL26kNd0KP84XX_7fzsw",
  authDomain: "trio-review.firebaseapp.com",
  projectId: "trio-review",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

document.getElementById("reviewForm").addEventListener("submit", async function(e){
  e.preventDefault();

  try {
    const file = document.getElementById("photo").files[0];

    if (!file) {
      alert("Please select image 📸");
      return;
    }

    // 🔥 Upload to Cloudinary
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "trio_upload");

    const response = await fetch("https://api.cloudinary.com/v1_1/dietn5zec/image/upload", {
      method: "POST",
      body: formData
    });

    const data = await response.json();
    const photoURL = data.secure_url;

    // 🔥 Save in Firestore
    await db.collection("review").add({
      name: document.getElementById("name").value,
      country: document.getElementById("country").value,
      photo: photoURL,
      message: document.getElementById("message").value,
      rating: parseInt(document.getElementById("rating").value)
    });

    alert("Review Submitted ✅");
    window.location.href = "thankyou.html";

  } catch(err) {
    alert("Error ❌ " + err.message);
  }
});
</script>

</body>
</html>
